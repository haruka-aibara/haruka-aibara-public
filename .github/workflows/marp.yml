name: Build and Deploy Marp Slides

on:
  push:
    branches: [main]
    paths: ['slides/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build slides
        run: |
          mkdir -p dist
          for f in slides/*.md; do
            name=$(basename "$f" .md)
            marp --html --allow-local-files "$f" --output "dist/${name}.html"
          done

      - name: Create index page
        run: |
          echo '<html><head><meta charset="utf-8"><title>Slides</title>' > dist/index.html
          echo '<style>body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:0 20px}' >> dist/index.html
          echo 'a{display:block;padding:12px;margin:8px 0;background:#f5f5f5;border-radius:4px;text-decoration:none;color:#333}' >> dist/index.html
          echo 'a:hover{background:#e8e8e8}</style></head><body>' >> dist/index.html
          echo '<h1>Slides</h1>' >> dist/index.html
          for f in dist/*.html; do
            name=$(basename "$f" .html)
            if [ "$name" != "index" ]; then
              echo "<a href=\"${name}.html\">${name}</a>" >> dist/index.html
            fi
          done
          echo '</body></html>' >> dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
