name: Build and Deploy Marp Slides

on:
  push:
    branches: [main]
    paths: ['slides/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build slides
        run: |
          find slides/ -name "*.md" -print0 | while IFS= read -r -d '' f; do
            rel="${f#slides/}"
            dir="$(dirname "$rel")"
            name="$(basename "$rel" .md)"
            mkdir -p "dist/$dir"
            marp --html --allow-local-files "$f" -o "dist/$dir/$name.html" </dev/null
          done

      - name: Create index page
        run: |
          cat <<'HTML' > dist/index.html
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>Slides</title>
          <style>
            body{font-family:sans-serif;max-width:800px;margin:40px auto;padding:0 20px}
            h2{margin-top:24px;color:#555;font-size:14px;text-transform:uppercase;letter-spacing:1px}
            a{display:block;padding:12px;margin:4px 0;background:#f5f5f5;border-radius:4px;text-decoration:none;color:#333}
            a:hover{background:#e8e8e8}
          </style>
          </head><body><h1>Slides</h1>
          HTML
          find dist/ -name "*.html" ! -name "index.html" | sort | while IFS= read -r f; do
            rel="${f#dist/}"
            dir="$(dirname "$rel")"
            name="$(basename "$rel" .html)"
            if [ "$dir" = "." ]; then
              echo "<a href=\"${rel}\">${name}</a>" >> dist/index.html
            else
              echo "<h2>${dir}</h2><a href=\"${rel}\">${name}</a>" >> dist/index.html
            fi
          done
          echo '</body></html>' >> dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
