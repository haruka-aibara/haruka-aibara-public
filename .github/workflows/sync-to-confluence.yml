name: Sync to Confluence

on:
  push:
    branches:
      - main
    paths:
      - 'Confluence/**'
      - 'Terraform/**'
      - 'Amazon Web Services/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync Markdown to Confluence (depth-ordered)
        env:
          MARK_USERNAME: ${{ secrets.CONFLUENCE_USER }}
          MARK_PASSWORD: ${{ secrets.CONFLUENCE_API_TOKEN }}
          MARK_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
        run: |
          set -euo pipefail

          # mark は親ページが存在しない場合に自動作成するが、正しい階層を解決できず
          # ルート直下に作成してしまう。そのため親ページを先に処理する必要がある。
          # .md ファイルをパスの深さ順に並べ、同じ深さ内ではフォルダ名と同名の
          # インデックスページを優先することで、親が必ず子より先に作成される。
          # front matter（<!-- Space: ...）があるファイルのみ対象にする。
          # 空ファイルや front matter なしのファイルを mark に渡すとエラーになるため。
          find Confluence Terraform "Amazon Web Services" -name "*.md" \
            | xargs grep -l "<!-- Space:" 2>/dev/null \
            | while IFS= read -r f; do
            dir=$(dirname "$f")
            base=$(basename "$f" .md)
            parent=$(basename "$dir")
            depth=$(printf "%s" "$f" | tr -cd '/' | wc -c)
            is_index=$([ "$base" = "$parent" ] && echo 0 || echo 1)
            printf "%d %d %s\n" "$depth" "$is_index" "$f"
          done | sort -k1,1n -k2,2n | awk '{print $3}' | \
          while IFS= read -r f; do
            echo "Syncing: $f"
            docker run --rm \
              -e MARK_USERNAME \
              -e MARK_PASSWORD \
              -e MARK_BASE_URL \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -w /workspace \
              kovetskiy/mark:v15.3.0 \
              mark -f "$f" \
              || echo "WARNING: Failed to sync $f, continuing..."
              # dumb-init がエントリーポイントのため "mark" コマンド名が必須。
              # フラグは -f（-file / --file は存在しない）。
              # 新規ページ作成時に mark が attachment API で panic するケースがある。
              # 1回目は失敗しても 2回目（update）で通るため、エラーを無視して続行する。
          done
